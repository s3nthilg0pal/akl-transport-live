apiVersion: apps/v1
kind: Deployment
metadata:
  name: akl-train-map
  namespace: akl-train-map
  labels:
    app: akl-train-map
spec:
  replicas: 1
  selector:
    matchLabels:
      app: akl-train-map
  template:
    metadata:
      labels:
        app: akl-train-map
    spec:
      containers:
        - name: akl-train-map
          image: ghcr.io/s3nthilg0pal/akl-transport-live:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: AT_SUBSCRIPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: akl-train-map-secret
                  key: AT_SUBSCRIPTION_KEY
            - name: AT_REALTIME_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: akl-train-map-secret
                  key: AT_REALTIME_ENDPOINT
            - name: AT_TRIP_UPDATES_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: akl-train-map-secret
                  key: AT_TRIP_UPDATES_ENDPOINT
                  optional: true
            - name: AT_GTFS_ZIP_URL
              valueFrom:
                secretKeyRef:
                  name: akl-train-map-secret
                  key: AT_GTFS_ZIP_URL
                  optional: true
            - name: AT_GTFS_ROUTES_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: akl-train-map-secret
                  key: AT_GTFS_ROUTES_ENDPOINT
                  optional: true
            - name: TRAIN_ROUTE_IDS
              valueFrom:
                secretKeyRef:
                  name: akl-train-map-secret
                  key: TRAIN_ROUTE_IDS
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
