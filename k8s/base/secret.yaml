# Secret template — do NOT commit real values.
# Create the secret manually before deploying:
#
#   kubectl create secret generic akl-train-map-secret \
#     --from-literal=AT_SUBSCRIPTION_KEY=<your-key> \
#     --from-literal=AT_REALTIME_ENDPOINT=https://api.at.govt.nz/realtime/legacy/vehiclelocations \
#     --namespace=akl-train-map
#
# Or use a Sealed Secret / External Secrets Operator instead.
apiVersion: v1
kind: Secret
metadata:
  name: akl-train-map-secret
  namespace: akl-train-map
type: Opaque
stringData:
  AT_SUBSCRIPTION_KEY: ""
  AT_REALTIME_ENDPOINT: ""
  AT_TRIP_UPDATES_ENDPOINT: ""
  AT_GTFS_ZIP_URL: ""
  AT_GTFS_ROUTES_ENDPOINT: ""
  TRAIN_ROUTE_IDS: ""
