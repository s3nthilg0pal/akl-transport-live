apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: akl-train-map

resources:
  - namespace.yaml
  - ../../base

# Replace tag with the exact SHA from the CI push, e.g. sha-abc1234
images:
  - name: ghcr.io/s3nthilg0pal/akl-transport-live
    newTag: latest

replicas:
  - name: akl-train-map
    count: 2
